services:
  chroma:
    image: chromadb/chroma:0.5.3
    container_name: chroma
    ports:
      - "8000:8000" # Mappo la porta per poterla ispezionare dall'host se necessario
    volumes:
      - ./data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - rag-net
    restart: unless-stopped

  rag:
    build:
      context: ./app
      dockerfile: Dockerfiles/rag/Dockerfile
    container_name: rag
    ports:
      - "8001:8001" # Mappo la porta del server FastAPI
    volumes:
      - ./app:/app
      - ./models_cache:/root/.cache/huggingface
    networks:
      - rag-net
    depends_on:
      - chroma
      - ollama
    env_file:
      - .env
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434" # Mappo la porta per testare l'LLM dall'host
    volumes:
      # Modificato per usare il volume Docker nominato (migliori performance e niente problemi di permessi)
      - ollama_data:/root/.ollama
    networks:
      - rag-net
    restart: unless-stopped

  # --- NUOVO SERVIZIO: Scarica il modello e si spegne ---
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    networks:
      - rag-net
    environment:
      - OLLAMA_HOST=ollama:11434 # Dice a questo container di parlare con il server Ollama principale
    depends_on:
      - ollama
    entrypoint: /bin/sh
    # Aspetta 5 secondi per far avviare il server, poi fa il pull del modello
    command: -c "sleep 5 && ollama pull llama3.2:3b"

  jupyter:
    build:
      context: ./app
      dockerfile: Dockerfiles/jupyter/Dockerfile
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYTHONPATH=/home/jovyan/work
      - HF_HOME=/home/jovyan/work/models_cache
      - TRANSFORMERS_CACHE=/home/jovyan/work/models_cache
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - rag-net
    restart: unless-stopped

networks:
  rag-net:
    driver: bridge

volumes:
  # Questo volume ora manterrà il modello llama3.2 salvato in cache tra un riavvio e l'altro
  ollama_data: